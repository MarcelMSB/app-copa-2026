<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f6b57">
    <meta name="description" content="Gerencie localmente suas figurinhas da Copa de 2026.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Álbum Copa 2026">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Álbum Copa 2026</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="assets/icon-180.png" sizes="180x180">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button hidden" id="backButton" type="button" aria-label="Voltar para os álbuns" title="Voltar">
          <span aria-hidden="true"><</span>
        </button>
        <div class="brand">
          <img src="assets/icon.svg" alt="" width="38" height="38">
          <div>
            <strong>Álbum Copa 2026</strong>
            <span id="syncStatus">Salvo neste dispositivo</span>
          </div>
        </div>
        <button class="theme-button" id="themeToggleButton" type="button" aria-label="Alternar modo escuro" title="Alternar tema">
          <span id="themeToggleIcon" aria-hidden="true">◐</span>
        </button>
        <button class="install-button hidden" id="installButton" type="button">Instalar</button>
      </header>

      <main>
        <section class="screen" id="albumsScreen" aria-labelledby="albumsTitle">
          <div class="intro-band">
            <div>
              <p class="eyebrow">Colecao local</p>
              <h1 id="albumsTitle">Seus álbuns</h1>
            </div>
            <div class="pitch-visual" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="album-create-panel">
            <div class="album-create-actions" id="albumCreateActions">
              <button class="primary-button" id="showAlbumFormButton" type="button">Adicionar álbum</button>
              <button class="ghost-button import-button" id="importAlbumButton" type="button">Importar</button>
            </div>
            <form class="album-form hidden" id="albumForm">
              <label>
                Nome do álbum
                <input id="albumName" name="name" required maxlength="80" placeholder="Meu álbum da Copa">
              </label>
              <label class="album-option">
                <input id="includeMcDonalds" type="checkbox">
                <span>Incluir coleção McDonald's</span>
              </label>
              <label class="album-option">
                <input id="includeCocaCola" type="checkbox" checked>
                <span>Incluir coleção Coca-Cola</span>
              </label>
              <button class="primary-button" type="submit">Criar álbum</button>
              <button class="ghost-button neutral-button" id="cancelAlbumFormButton" type="button">Cancelar</button>
              <input id="importAlbumInput" class="hidden" type="file" accept="application/json,.json">
            </form>
          </div>

          <div class="album-toolbar">
            <button class="ghost-button neutral-button" id="compareModeButton" type="button">Comparar álbuns</button>
            <div class="compare-actions hidden" id="compareActions">
              <span id="compareSelectionMeta">Selecione 2 álbuns</span>
              <button class="primary-button hidden" id="runCompareButton" type="button">Comparar</button>
              <button class="ghost-button neutral-button" id="cancelCompareButton" type="button">Cancelar</button>
            </div>
            <button class="ghost-button neutral-button hidden" id="finishReorderButton" type="button">Concluir ordem</button>
          </div>

          <section class="compare-panel hidden" id="comparePanel" aria-live="polite">
            <div class="compare-panel-heading">
              <div>
                <p class="panel-kicker">Comparação</p>
                <h2 id="compareTitle">Conferência de álbuns</h2>
              </div>
              <button class="ghost-button neutral-button" id="closeCompareButton" type="button">Fechar</button>
            </div>
            <div class="compare-result" id="compareResult"></div>
          </section>

          <div class="album-grid" id="albumList" aria-live="polite"></div>
          <p class="empty-state hidden" id="emptyAlbums">Crie seu primeiro álbum para começar a marcar as figurinhas.</p>
        </section>

        <section class="screen hidden" id="stickersScreen" aria-labelledby="stickersTitle">
          <div class="album-dashboard">
            <div class="dashboard-title">
              <p class="eyebrow">Álbum ativo</p>
              <div class="title-row">
                <h1 id="stickersTitle"></h1>
                <div class="share-actions">
                  <button class="summary-action-button" id="shareCollectionButton" type="button" aria-label="Compartilhar resumo" title="Compartilhar">
                    <img src="assets/ui/share-2.svg" alt="" aria-hidden="true">
                  </button>
                  <button class="summary-action-button whatsapp-button" id="whatsappShareButton" type="button" aria-label="Compartilhar no WhatsApp" title="WhatsApp">
                    <img src="assets/ui/whatsapp.svg" alt="" aria-hidden="true">
                  </button>
                </div>
              </div>
              <p id="albumMeta"></p>
            </div>
            <div class="summary-side">
              <div class="collection-summary" id="collectionSummary"></div>
              <div class="progress-panel">
                <div class="progress-ring" id="progressRing">
                  <span id="progressPercent">0%</span>
                </div>
                <div>
                  <strong id="progressSummary">0 obtidas</strong>
                </div>
              </div>
            </div>
          </div>

          <section class="mode-panel" aria-label="Agrupamento">
            <div class="mode-options" id="modeOptions">
              <label class="mode-option">
                <input type="radio" name="viewMode" value="group" checked>
                <span>Por Grupo</span>
              </label>
              <label class="mode-option">
                <input type="radio" name="viewMode" value="team">
                <span>Por Time</span>
              </label>
              <label class="mode-option">
                <input type="radio" name="viewMode" value="sticker">
                <span>Por Figurinha</span>
              </label>
            </div>
            <button class="filter-toggle" id="filterToggle" type="button">Filtros</button>
            <button class="ghost-button clear-filter-button hidden" id="clearFilterButton" type="button">Limpar</button>
            <div class="filter-panel hidden" id="filterPanel">
              <label class="search-field">
                <span>Buscar</span>
                <input id="searchInput" placeholder="Time, sigla, grupo ou figurinha">
              </label>
              <label>
                Status
                <select id="statusFilter">
                  <option value="all">Todas</option>
                  <option value="owned">Já obtidas</option>
                  <option value="missing">Faltando</option>
                  <option value="noted">Com observacao</option>
                </select>
              </label>
              <label>
                Tipo
                <select id="stickerTypeFilter">
                  <option value="all">Todas</option>
                  <option value="emblem">Emblemas</option>
                  <option value="profile">Seleções perfiladas</option>
                  <option value="standard">Demais figurinhas</option>
                </select>
              </label>
            </div>
          </section>

          <section class="collection-panel" aria-labelledby="collectionTitle">
            <div class="panel-heading collection-heading">
              <div>
                <p class="panel-kicker" id="collectionKicker">Times</p>
                <h2 id="collectionTitle">Selecione um time</h2>
              </div>
              <button class="ghost-button hidden" id="collectionBackButton" type="button">Voltar</button>
            </div>
            <div class="flag-row hidden" id="flagRow"></div>
            <div class="collection-grid" id="collectionGrid" aria-live="polite"></div>
            <p class="empty-state hidden" id="emptyCollection">Nenhum item encontrado com esses filtros.</p>
          </section>
        </section>
      </main>
    </div>

    <template id="albumCardTemplate">
      <article class="album-card">
        <div class="album-card-top">
          <label class="album-compare-choice hidden">
            <input type="checkbox">
            <span>Selecionar</span>
          </label>
          <div class="album-reorder-controls hidden">
            <button class="album-icon-action move-up-button" type="button" aria-label="Mover álbum para cima" title="Mover para cima">
              <span aria-hidden="true">↑</span>
            </button>
            <button class="album-icon-action move-down-button" type="button" aria-label="Mover álbum para baixo" title="Mover para baixo">
              <span aria-hidden="true">↓</span>
            </button>
          </div>
        </div>
        <button class="album-open" type="button">
          <span class="album-cover" aria-hidden="true"></span>
          <span class="album-info">
            <strong></strong>
            <span></span>
          </span>
        </button>
        <div class="album-actions">
          <button class="album-icon-action missing-share-button" type="button" aria-label="Compartilhar figurinhas faltantes" title="Compartilhar faltantes">
            <img src="assets/ui/share-2.svg" alt="" aria-hidden="true">
          </button>
          <button class="album-icon-action missing-whatsapp-button whatsapp-button" type="button" aria-label="Compartilhar faltantes no WhatsApp" title="WhatsApp faltantes">
            <img src="assets/ui/whatsapp.svg" alt="" aria-hidden="true">
          </button>
          <button class="ghost-button export-button" type="button">Exportar</button>
          <button class="delete-icon-button delete-button" type="button" aria-label="Excluir álbum" title="Excluir álbum">
            <span aria-hidden="true">🗑</span>
          </button>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
